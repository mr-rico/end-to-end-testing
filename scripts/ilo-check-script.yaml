apiVersion: v1
kind: ConfigMap
metadata:
  name: ilo-check-script
  namespace: testkube
data:
  check-ilo.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m'

    : "${ILO_USERNAME:?ILO_USERNAME is required}"
    : "${ILO_PASSWORD:?ILO_PASSWORD is required}"

    TARGETS_FILE="${TARGETS_FILE:-/data/targets.txt}"

    failures=0

    check_health_field() {
      local host="$1"
      local label="$2"
      local url="$3"
      local jq_expr="$4"

      echo "Checking ${label} on ${host}"
      response="$(curl -sk --connect-timeout 10 --max-time 30 \
        -u "${ILO_USERNAME}:${ILO_PASSWORD}" \
        "https://${host}${url}")" || {
          echo -e "${RED}ERROR:${NC} Unable to reach ${label} endpoint on ${host}"
          failures=$((failures+1))
          return
        }

      value="$(echo "${response}" | jq -r "${jq_expr} // empty")"

      if [[ -z "${value}" || "${value}" == "null" ]]; then
        echo -e "${YELLOW}WARN:${NC} ${label} returned no usable value on ${host}"
        failures=$((failures+1))
        return
      fi

      case "${value}" in
        OK|Enabled|On)
          echo -e "${GREEN}PASS:${NC} ${label} = ${value}"
          ;;
        *)
          echo -e "${RED}FAIL:${NC} ${label} = ${value}"
          failures=$((failures+1))
          ;;
      esac
    }

    check_storage() {
      local host="$1"
      echo "Checking storage health on ${host}"

      systems_json="$(curl -sk --connect-timeout 10 --max-time 30 \
        -u "${ILO_USERNAME}:${ILO_PASSWORD}" \
        "https://${host}/redfish/v1/Systems/1")" || {
          echo -e "${RED}ERROR:${NC} Unable to read system resource from ${host}"
          failures=$((failures+1))
          return
        }

      storage_uri="$(echo "${systems_json}" | jq -r '.Storage["@odata.id"] // empty')"

      if [[ -z "${storage_uri}" ]]; then
        echo -e "${YELLOW}WARN:${NC} No storage URI found for ${host}"
        return
      fi

      storage_json="$(curl -sk --connect-timeout 10 --max-time 30 \
        -u "${ILO_USERNAME}:${ILO_PASSWORD}" \
        "https://${host}${storage_uri}")" || {
          echo -e "${RED}ERROR:${NC} Unable to read storage collection from ${host}"
          failures=$((failures+1))
          return
        }

      member_uris="$(echo "${storage_json}" | jq -r '.Members[]?["@odata.id"]')"

      if [[ -z "${member_uris}" ]]; then
        echo -e "${YELLOW}WARN:${NC} No storage members found for ${host}"
        return
      fi

      while IFS= read -r member_uri; do
        [[ -z "${member_uri}" ]] && continue

        member_json="$(curl -sk --connect-timeout 10 --max-time 30 \
          -u "${ILO_USERNAME}:${ILO_PASSWORD}" \
          "https://${host}${member_uri}")" || {
            echo -e "${RED}ERROR:${NC} Unable to read storage member ${member_uri} on ${host}"
            failures=$((failures+1))
            continue
          }

        member_health="$(echo "${member_json}" | jq -r '.Status.Health // empty')"
        member_id="$(echo "${member_json}" | jq -r '.Id // .Name // "unknown-storage-member"')"

        if [[ "${member_health}" == "OK" ]]; then
          echo -e "${GREEN}PASS:${NC} Storage member ${member_id} health = OK"
        else
          echo -e "${RED}FAIL:${NC} Storage member ${member_id} health = ${member_health:-unknown}"
          failures=$((failures+1))
        fi
      done <<< "${member_uris}"
    }

    while IFS= read -r host; do
      [[ -z "${host}" ]] && continue
      echo "=================================================="
      echo "Checking iLO target: ${host}"
      echo "=================================================="

      check_health_field "${host}" "System Health" "/redfish/v1/Systems/1" '.Status.Health'
      check_health_field "${host}" "System State" "/redfish/v1/Systems/1" '.Status.State'
      check_health_field "${host}" "Power State" "/redfish/v1/Systems/1" '.PowerState'
      check_health_field "${host}" "Manager Health" "/redfish/v1/Managers/1" '.Status.Health'
      check_health_field "${host}" "Chassis Health" "/redfish/v1/Chassis/1" '.Status.Health'

      check_storage "${host}"
      echo
    done < "${TARGETS_FILE}"

    if [[ "${failures}" -gt 0 ]]; then
      echo -e "${RED}Hardware validation failed with ${failures} issue(s).${NC}"
      exit 1
    fi

    echo -e "${GREEN}All iLO hardware checks passed.${NC}"


